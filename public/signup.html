<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h2 { text-align: center; color: #333; margin-bottom: 24px; }
    .field { margin-bottom: 16px; }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border 0.3s;
    }
    input:focus { outline: none; border-color: #11998e; }
    input.invalid { border-color: #e74c3c; }
    input.valid-input { border-color: #11998e; }
    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
    .field-error {
      font-size: 12px;
      color: #e74c3c;
      margin-top: 4px;
      display: none;
    }
    .strength-bar {
      height: 4px;
      border-radius: 4px;
      margin-top: 6px;
      background: #eee;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
    }
    .strength-text {
      font-size: 11px;
      margin-top: 3px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #11998e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }
    button:hover { background: #0e8a7f; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #message {
      margin-top: 16px;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      display: none;
    }
    .success { background: #d4edda; color: #155724; display: block !important; }
    .error   { background: #f8d7da; color: #721c24; display: block !important; }
    p { text-align: center; margin-top: 16px; font-size: 14px; }
    a { color: #11998e; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h2>📝 Sign Up</h2>

    <div class="field">
      <input type="text" id="username" placeholder="Username" oninput="checkUsername()" />
      <div class="hint">3–20 chars, letters/numbers/underscore only, must start with a letter</div>
      <div class="field-error" id="usernameError"></div>
    </div>

    <div class="field">
      <input type="email" id="email" placeholder="Email Address" oninput="checkEmail()" />
      <div class="field-error" id="emailError"></div>
    </div>

    <div class="field">
      <input type="password" id="password" placeholder="Password" oninput="checkPassword()" />
      <div class="hint">Min 6 chars, must have letter + number, no spaces</div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-text" id="strengthText"></div>
      <div class="field-error" id="passwordError"></div>
    </div>

    <button id="signupBtn" onclick="handleSignup()">Create Account</button>
    <div id="message"></div>
    <p>Already have an account? <a href="/login.html">Login</a></p>
  </div>

  <script>
    function checkUsername() {
      const val = document.getElementById('username').value;
      const err = document.getElementById('usernameError');
      const inp = document.getElementById('username');
      let msg = '';

      if (val === '') { msg = 'Username is required'; }
      else if (val.length < 3) { msg = 'Too short (min 3 characters)'; }
      else if (val.length > 20) { msg = 'Too long (max 20 characters)'; }
      else if (/^\d/.test(val)) { msg = 'Must start with a letter'; }
      else if (!/^[a-zA-Z0-9_]+$/.test(val)) { msg = 'Only letters, numbers, underscore allowed'; }

      if (msg) {
        err.textContent = msg;
        err.style.display = 'block';
        inp.className = 'invalid';
        return false;
      }
      err.style.display = 'none';
      inp.className = 'valid-input';
      return true;
    }

    function checkEmail() {
      const val = document.getElementById('email').value;
      const err = document.getElementById('emailError');
      const inp = document.getElementById('email');
      let msg = '';

      if (val === '') { msg = 'Email is required'; }
      else if (!val.includes('@')) { msg = 'Must contain @ symbol'; }
      else if (val.length > 100) { msg = 'Email too long (max 100 chars)'; }
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) { msg = 'Invalid email format'; }

      if (msg) {
        err.textContent = msg;
        err.style.display = 'block';
        inp.className = 'invalid';
        return false;
      }
      err.style.display = 'none';
      inp.className = 'valid-input';
      return true;
    }

    function checkPassword() {
      const val = document.getElementById('password').value;
      const err = document.getElementById('passwordError');
      const inp = document.getElementById('password');
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');
      let msg = '';

      // Strength calculation
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { pct: '0%',   color: '#eee',    label: '' },
        { pct: '25%',  color: '#e74c3c', label: '🔴 Very Weak' },
        { pct: '50%',  color: '#e67e22', label: '🟠 Weak' },
        { pct: '70%',  color: '#f1c40f', label: '🟡 Fair' },
        { pct: '88%',  color: '#2ecc71', label: '🟢 Strong' },
        { pct: '100%', color: '#27ae60', label: ' Very Strong' },
      ];
      fill.style.width = levels[score].pct;
      fill.style.background = levels[score].color;
      text.textContent = levels[score].label;
      text.style.color = levels[score].color;

      // Validation
      if (val === '') { msg = 'Password is required'; }
      else if (/\s/.test(val)) { msg = 'No spaces allowed'; }
      else if (val.length < 6) { msg = 'Too short (min 6 characters)'; }
      else if (val.length > 50) { msg = 'Too long (max 50 characters)'; }
      else if (!/[A-Za-z]/.test(val)) { msg = 'Must contain at least one letter'; }
      else if (!/[0-9]/.test(val)) { msg = 'Must contain at least one number'; }

      if (msg) {
        err.textContent = msg;
        err.style.display = 'block';
        inp.className = 'invalid';
        return false;
      }
      err.style.display = 'none';
      inp.className = 'valid-input';
      return true;
    }

    async function handleSignup() {
      const ok = checkUsername() & checkEmail() & checkPassword();
      if (!ok) return;

      const username = document.getElementById('username').value;
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msgDiv   = document.getElementById('message');
      const btn      = document.getElementById('signupBtn');

      btn.disabled = true;
      btn.textContent = 'Creating...';
      msgDiv.style.display = 'none';

      try {
        const res  = await fetch('/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        msgDiv.textContent = data.message;
        msgDiv.className   = data.success ? 'success' : 'error';
      } catch (e) {
        msgDiv.textContent = 'Server error. Please try again.';
        msgDiv.className   = 'error';
      }

      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  </script>
</body>
</html>
